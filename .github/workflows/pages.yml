name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir public
          rsync -av ./ public/ \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.codex/' \
            --exclude='.codex.pre-*' \
            --exclude='.venv/' \
            --exclude='.venv-*' \
            --exclude='markitdown/' \
            --exclude='testTEMP/' \
            --exclude='public/' \
            --exclude='AGENTS.md' \
            --exclude='.gitmodules' \
            --exclude='.agentscompany-install.json'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
