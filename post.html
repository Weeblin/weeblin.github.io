<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post – Minimalist Academic Blog</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-title"><a href="index.html">Wenlin Yi</a></div>

      <div class="header-actions">
        <div id="search-slot"></div>
        <nav id="main-nav" class="nav"></nav>
      </div>

      <button id="menu-toggle" class="menu-toggle" aria-label="Toggle navigation">
        ☰
      </button>
    </header>
    <main class="container">
      <article id="post-content" class="post-content"></article>
      <section id="comments-root" class="comments-section"></section>
    </main>
    <!-- Marked for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- MathJax for LaTeX rendering -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <script src="scripts/main.js"></script>
<script src="scripts/search.js"></script>
    <script src="scripts/user-system.js"></script>
    <script src="scripts/comments.js"></script>
  </body>
</html>
